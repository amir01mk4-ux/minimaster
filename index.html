<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniMaster AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>3-Day Skill Challenge</h1>
        <p>Master a new micro-skill in 15 minutes.</p>

        <div class="input-group">
            <label for="category">Select a Category</label>
            <select id="category">
                <option value="Digital Business">Digital Business</option>
                <option value="Technology & AI">Technology & AI</option>
                <option value="Psychology & Sales">Psychology & Sales</option>
                <option value="Survival Hacks">Survival Hacks</option>
            </select>
        </div>

        <button id="action-btn" onclick="generateSkill()">Give Me a Skill</button>
        
        <p id="shots-display">Daily Shots Left: 2</p>

        <div id="result-box" style="display: none;"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
