<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniMaster Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="auth-view" class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h2>MiniMaster <span class="badge">PRO</span></h2>
                <p>Sign in to unlock your daily curriculum.</p>
            </div>
            <div class="auth-form">
                <input type="email" id="email" placeholder="name@company.com">
                <input type="password" id="password" placeholder="••••••••">
                <button class="btn-primary" onclick="handleLogin()">Sign In</button>
                <button class="btn-secondary" onclick="handleSignup()">Create Account</button>
            </div>
            <p id="auth-error" class="error-msg"></p>
        </div>
    </div>

    <div id="app-view" style="display: none;">
        <nav class="top-nav">
            <div class="logo">MiniMaster <span class="badge">PRO</span></div>
            <button class="btn-text" onclick="handleLogout()">Sign Out</button>
        </nav>

        <main class="dashboard">
            <header class="dash-header">
                <h1>Generate Your Syllabus</h1>
                <p>Select a discipline to master today.</p>
            </header>

            <div class="control-panel">
                <select id="category" class="premium-select">
                    <option value="Digital Audience Building">Digital Audience Building</option>
                    <option value="High-Ticket Sales">High-Ticket Sales</option>
                    <option value="AI Automation workflows">AI Automation Workflows</option>
                    <option value="Copywriting Psychology">Copywriting Psychology</option>
                </select>
                <button id="action-btn" class="btn-primary" onclick="generateSkill()">Architect Syllabus</button>
            </div>

            <div id="results-container" style="display: none;">
                <div class="card skill-card">
                    <h3 id="ui-skill-name">Skill Name</h3>
                </div>
                
                <div class="card desc-card">
                    <h4>Why it matters</h4>
                    <p id="ui-skill-desc">Description goes here.</p>
                </div>

                <div class="course-controls">
                    <button id="course-btn" class="btn-accent" onclick="startCourse()">Unlock 3-Day Course</button>
                </div>

                <div id="course-content" class="course-container" style="display: none;">
                    <div id="day-1-box" class="day-box" style="display: none;">
                        <span class="day-label">Day 1</span>
                        <p id="ui-day-1"></p>
                    </div>
                    <div id="day-2-box" class="day-box" style="display: none;">
                        <span class="day-label">Day 2</span>
                        <p id="ui-day-2"></p>
                    </div>
                    <div id="day-3-box" class="day-box" style="display: none;">
                        <span class="day-label">Day 3</span>
                        <p id="ui-day-3"></p>
                    </div>
                    
                    <button id="next-day-btn" class="btn-secondary mt-15" onclick="revealNextDay()">Reveal Next Day</button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
